description: |
  **Still-nanoda** - A fork of nanoda/sonanoda with experiemental optimization efforts.
url: https://github.com/SchrodingerZhu/still-nanoda
ref: cache-study-port
rev: 06a07b74436f8a111df836312ccac3a41b93c7b6
build: |
  cargo build --release
  cat > config.json <<__END__
   {
     "use_stdin": true,
     "nat_extension": true,
     "string_extension": true,
     "unpermitted_axiom_hard_error": false,
     "unsafe_permit_all_axioms": true,
     "num_threads": 4
   }
  __END__
run: |
  target/release/nanoda_bin config.json < "$IN" || exit 1
